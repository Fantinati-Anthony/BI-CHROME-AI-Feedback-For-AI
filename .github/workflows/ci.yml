name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Lint, type-check, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Validate JSON files
        run: |
          set -e
          for f in manifest.json .eslintrc.json .prettierrc package.json jsconfig.json; do
            [ -f "$f" ] && echo "→ $f" && node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))"
          done

      - name: Syntax-check every .js
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            if [ "$f" = "./background.js" ]; then
              tmp=$(mktemp --suffix=.js)
              sed -E "s/^[[:space:]]*importScripts\([^)]*\);/\/\/ stripped/" "$f" > "$tmp"
              node --check "$tmp" || fail=1
              rm -f "$tmp"
            else
              node --check "$f" || fail=1
            fi
          done < <(find . -type f -name '*.js' \
                     -not -path './node_modules/*' \
                     -not -path './vscode-extension/node_modules/*' \
                     -not -path './coverage/*' \
                     -not -path './dist/*' \
                     -not -path './.git/*')
          exit $fail

      - name: ESLint
        run: npx eslint . --max-warnings=200

      - name: Prettier check
        run: npx prettier --check '**/*.{js,mjs,json,md,html,css}' --ignore-path .prettierignore || echo "::warning::Prettier found formatting issues"

      - name: TypeScript type-check
        run: npx -y -p typescript@5.4.5 tsc -p jsconfig.json --noEmit || echo "::warning::TS check soft-failed (JS-only project, opt-in via // @ts-check)"

      - name: Run tests
        run: npm test

      - name: Build distribution bundles
        run: npm run build
